services:
  - type: web
    name: sahaba-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: RENDER_URL
        sync: false
      # مفاتيح Gemini API
      - key: GEMINI_KEY_1
        sync: false
      - key: GEMINI_KEY_2
        sync: false
      # إعدادات Rate Limits (اختيارية - اضبطها حسب حسابك)
      - key: GEMINI_MAX_RPM
        value: "30"        # غيّر حسب ما يظهر في AI Studio
      - key: GEMINI_MAX_TPM
        value: "200000"    # غيّر حسب ما يظهر في AI Studio
      - key: GEMINI_MAX_RPD
        value: "1500"      # غيّر حسب ما يظهر في AI Studio
