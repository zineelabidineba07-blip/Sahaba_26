services:
  - type: web
    name: sahaba-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter        # تم التغيير من free إلى starter لضمان التشغيل الدائم

    # Health check — Render pings this to confirm the service is live
    healthCheckPath: /health

    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: RENDER_URL
        sync: false          # مثال: https://sahaba-bot.onrender.com
      # ملاحظة: تم حذف WEBHOOK_SECRET بناءً على طلبك
